<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SwipeSavvy API Documentation</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5.17.14/swagger-ui.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fafafa;
    }

    /* Top navigation bar */
    .topbar {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .topbar-logo {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .topbar-logo span {
      color: #e94560;
    }

    .topbar-badge {
      background: rgba(233, 69, 96, 0.2);
      color: #e94560;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 12px;
      border: 1px solid rgba(233, 69, 96, 0.3);
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .env-selector {
      background: rgba(255,255,255,0.1);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      outline: none;
    }

    .env-selector:hover {
      background: rgba(255,255,255,0.15);
    }

    .env-selector option {
      background: #1a1a2e;
      color: #fff;
    }

    .topbar-link {
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-size: 13px;
      transition: color 0.2s;
    }

    .topbar-link:hover {
      color: #fff;
    }

    /* Stats bar */
    .stats-bar {
      background: #fff;
      border-bottom: 1px solid #e8e8e8;
      padding: 10px 24px;
      display: flex;
      gap: 32px;
      font-size: 13px;
      color: #666;
    }

    .stat-item strong {
      color: #1a1a2e;
      font-weight: 600;
    }

    /* Override Swagger UI styles */
    .swagger-ui .topbar { display: none; }

    .swagger-ui .info {
      margin: 30px 0 20px;
    }

    .swagger-ui .info hgroup.main h2.title {
      font-size: 28px;
      color: #1a1a2e;
    }

    .swagger-ui .info .description p {
      color: #555;
      line-height: 1.6;
    }

    .swagger-ui .opblock-tag {
      border-bottom: 1px solid #e8e8e8;
      font-size: 18px;
    }

    .swagger-ui .opblock.opblock-post {
      border-color: #49cc90;
      background: rgba(73, 204, 144, 0.05);
    }

    .swagger-ui .opblock.opblock-get {
      border-color: #61affe;
      background: rgba(97, 175, 254, 0.05);
    }

    .swagger-ui .opblock.opblock-put {
      border-color: #fca130;
      background: rgba(252, 161, 48, 0.05);
    }

    .swagger-ui .opblock.opblock-delete {
      border-color: #f93e3e;
      background: rgba(249, 62, 62, 0.05);
    }

    .swagger-ui .opblock.opblock-patch {
      border-color: #50e3c2;
      background: rgba(80, 227, 194, 0.05);
    }

    .swagger-ui .btn.authorize {
      color: #e94560;
      border-color: #e94560;
    }

    .swagger-ui .btn.authorize svg {
      fill: #e94560;
    }

    .swagger-ui section.models {
      border: 1px solid #e8e8e8;
      border-radius: 8px;
    }

    #swagger-ui {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* Loading state */
    .loading-overlay {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      color: #666;
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e8e8e8;
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Error banner */
    .error-banner {
      background: #fff3cd;
      border: 1px solid #ffc107;
      color: #856404;
      padding: 12px 24px;
      font-size: 14px;
      display: none;
      align-items: center;
      gap: 8px;
    }

    .error-banner.visible { display: flex; }

    @media (max-width: 768px) {
      .topbar { flex-wrap: wrap; gap: 8px; }
      .stats-bar { flex-wrap: wrap; gap: 16px; }
    }
  </style>
</head>
<body>
  <!-- Custom top navigation -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">Swipe<span>Savvy</span> API</div>
      <span class="topbar-badge">v1.0.0</span>
    </div>
    <div class="topbar-right">
      <select class="env-selector" id="envSelector" onchange="switchEnvironment(this.value)">
        <option value="bundled" selected>API Reference</option>
        <option value="production">Live: Production (EC2)</option>
        <option value="production-domain">Live: Production (Domain)</option>
        <option value="development">Live: Development (Local)</option>
      </select>
      <a href="https://github.com/swipesavvy" class="topbar-link" target="_blank">GitHub</a>
    </div>
  </div>

  <!-- Stats bar -->
  <div class="stats-bar" id="statsBar">
    <div class="stat-item"><strong>360+</strong> Endpoints</div>
    <div class="stat-item"><strong>49</strong> Domain Groups</div>
    <div class="stat-item"><strong>8</strong> Auth Methods</div>
    <div class="stat-item">OpenAPI <strong>3.0.3</strong></div>
  </div>

  <!-- Error banner for CORS/connectivity issues -->
  <div class="error-banner" id="errorBanner">
    Loading bundled specification (API server unreachable)
  </div>

  <!-- Swagger UI container -->
  <div id="swagger-ui">
    <div class="loading-overlay" id="loadingState">
      <div class="loading-spinner"></div>
      <p>Loading API specification...</p>
    </div>
  </div>

  <script src="https://unpkg.com/swagger-ui-dist@5.17.14/swagger-ui-bundle.js"></script>
  <script src="https://unpkg.com/swagger-ui-dist@5.17.14/swagger-ui-standalone-preset.js"></script>
  <script>
    const ENVIRONMENTS = {
      production: {
        specUrl: 'http://54.224.8.14:8000/openapi.json',
        serverUrl: 'http://54.224.8.14:8000'
      },
      'production-domain': {
        specUrl: 'https://api.swipesavvy.com/openapi.json',
        serverUrl: 'https://api.swipesavvy.com'
      },
      development: {
        specUrl: 'http://localhost:8000/openapi.json',
        serverUrl: 'http://localhost:8000'
      }
    };

    const BUNDLED_SPEC_URL = './openapi.yaml';
    let currentUI = null;

    function initSwaggerUI(specSource) {
      const config = {
        dom_id: '#swagger-ui',
        deepLinking: true,
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset
        ],
        plugins: [
          SwaggerUIBundle.plugins.DownloadUrl
        ],
        layout: 'StandaloneLayout',
        defaultModelsExpandDepth: 1,
        defaultModelExpandDepth: 2,
        docExpansion: 'list',
        filter: true,
        showExtensions: true,
        showCommonExtensions: true,
        tryItOutEnabled: true,
        requestInterceptor: (req) => {
          // Add any default headers
          return req;
        },
        onComplete: () => {
          document.getElementById('loadingState')?.remove();
        }
      };

      if (typeof specSource === 'string') {
        config.url = specSource;
      } else {
        config.spec = specSource;
      }

      currentUI = SwaggerUIBundle(config);
    }

    async function switchEnvironment(env) {
      document.getElementById('loadingState')?.remove();

      if (env === 'bundled') {
        document.getElementById('errorBanner').classList.remove('visible');
        initSwaggerUI(BUNDLED_SPEC_URL);
        return;
      }

      const envConfig = ENVIRONMENTS[env];
      try {
        const response = await fetch(envConfig.specUrl, {
          method: 'GET',
          signal: AbortSignal.timeout(5000)
        });

        if (!response.ok) throw new Error('API unreachable');

        const spec = await response.json();
        document.getElementById('errorBanner').classList.remove('visible');
        initSwaggerUI(spec);
      } catch (e) {
        console.warn(`Cannot reach ${env} API, using bundled spec:`, e.message);
        document.getElementById('errorBanner').classList.add('visible');
        initSwaggerUI(BUNDLED_SPEC_URL);
      }
    }

    // Initialize with bundled spec (always available)
    switchEnvironment('bundled');
  </script>
</body>
</html>
