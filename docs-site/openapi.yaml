openapi: 3.0.3
info:
  title: SwipeSavvy Backend API
  description: |
    Multi-service backend API for SwipeSavvy Mobile Wallet — a fintech platform providing
    card issuance (FIS), payments (Authorize.Net), KYC, rewards, real-time chat, and admin management.

    ## Authentication
    Most endpoints require a JWT Bearer token obtained via `POST /api/v1/auth/login` + `POST /api/v1/auth/verify-login-otp`.

    | Token | Lifetime | Purpose |
    |-------|----------|---------|
    | Access Token | 24 hours | Authorize API requests |
    | Refresh Token | 30 days | Obtain new access tokens |

    ## Environments
    Use the server selector above to switch between Production, Staging, and Development.
  version: 1.0.0
  contact:
    name: SwipeSavvy Engineering
    email: engineering@swipesavvy.com
  license:
    name: Proprietary

servers:
  - url: http://54.224.8.14:8000
    description: Production (AWS EC2)
  - url: https://api.swipesavvy.com
    description: Production (Domain)
  - url: http://localhost:8000
    description: Development (Local)

tags:
  - name: Auth
    description: User authentication, signup, login, OTP, password reset
  - name: KYC
    description: KYC verification, documents, identity, OFAC screening
  - name: Accounts
    description: User accounts, transactions, linked banks, analytics
  - name: FIS Cards
    description: FIS card issuance, activation, replacement, cancellation
  - name: Card Controls
    description: Card lock/unlock, limits, channels, geo, alerts, PIN
  - name: Card Transactions
    description: Card transaction history, analytics, disputes
  - name: Payments
    description: Payment processing, refunds, subscriptions
  - name: Wallet
    description: Wallet balance, transactions, payment methods, transfers
  - name: Rewards
    description: Rewards points, boosts, goals, budgets, preferences
  - name: Notifications
    description: Push notifications, device registration, SNS
  - name: Chat
    description: Real-time chat via WebSocket and REST
  - name: Feature Flags
    description: Feature flag CRUD, toggle, mobile flags
  - name: Admin Auth
    description: Admin authentication and session management
  - name: Admin Dashboard
    description: Admin dashboard, analytics, and metrics
  - name: Admin Users
    description: Admin user management
  - name: Admin Merchants
    description: Admin merchant management
  - name: Admin Support
    description: Admin support ticket management
  - name: Admin Feature Flags
    description: Admin feature flag management
  - name: Admin AI Campaigns
    description: Admin AI campaign management
  - name: Admin Audit Logs
    description: Admin audit log viewing
  - name: Admin Settings
    description: Admin platform settings
  - name: Admin RBAC
    description: Admin roles, policies, permissions
  - name: Admin Charities
    description: Admin charity management
  - name: Admin Chat Dashboard
    description: Admin chat session monitoring
  - name: FIS Fraud
    description: Fraud reports, alerts, travel notices, risk scores
  - name: FIS Digital Wallet
    description: Apple Pay, Google Pay, Samsung Pay provisioning
  - name: FIS Webhooks
    description: Inbound webhook events from FIS
  - name: Preferred Merchants
    description: Merchant discovery, deals, subscriptions
  - name: Marketing
    description: Campaign management, AI copy, optimization
  - name: Marketing AI
    description: Behavioral analysis, personalized promotions
  - name: Support
    description: Customer support ticket system
  - name: Location
    description: Geocoding, routing, geofencing, device tracking
  - name: AI Concierge
    description: Employee AI chat assistant
  - name: Website Concierge
    description: Public website AI chat
  - name: Website Forms
    description: Contact, demo request, sales inquiry forms
  - name: Push Notifications
    description: In-app notification management
  - name: Health
    description: Health and readiness probes

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token from login flow
    AdminAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Admin JWT token from admin login
    WebhookSignature:
      type: apiKey
      in: header
      name: X-FIS-Signature
      description: FIS webhook signature verification

  schemas:
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        data:
          type: object

    ErrorResponse:
      type: object
      properties:
        detail:
          type: string

    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer

    UserProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        first_name:
          type: string
        last_name:
          type: string
        phone:
          type: string
        date_of_birth:
          type: string
          format: date
        email_verified:
          type: boolean
        phone_verified:
          type: boolean
        kyc_tier:
          type: string
          enum: [none, tier1, tier2, tier3]
        created_at:
          type: string
          format: date-time
        last_login:
          type: string
          format: date-time

    TokenPair:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          example: bearer
        expires_in:
          type: integer
          example: 86400

    Card:
      type: object
      properties:
        card_id:
          type: string
        card_type:
          type: string
          enum: [virtual, physical]
        last_four:
          type: string
        status:
          type: string
          enum: [active, inactive, locked, frozen, cancelled, pending_activation]
        expiry_date:
          type: string
        cardholder_name:
          type: string
        nickname:
          type: string
        is_primary:
          type: boolean
        is_locked:
          type: boolean
        created_at:
          type: string
          format: date-time

    Transaction:
      type: object
      properties:
        id:
          type: string
        card_id:
          type: string
        transaction_type:
          type: string
          enum: [purchase, refund, withdrawal, deposit, transfer, fee]
        amount:
          type: number
          format: float
        currency:
          type: string
          example: USD
        merchant_name:
          type: string
        merchant_category:
          type: string
        mcc_code:
          type: string
        status:
          type: string
          enum: [completed, pending, declined, reversed]
        channel:
          type: string
          enum: [pos, ecommerce, atm, contactless]
        created_at:
          type: string
          format: date-time
        description:
          type: string
        category:
          type: string
        is_international:
          type: boolean

    ShippingAddress:
      type: object
      required: [street, city, state, zip_code, country]
      properties:
        street:
          type: string
        street2:
          type: string
        city:
          type: string
        state:
          type: string
        zip_code:
          type: string
        country:
          type: string
          example: US

    FeatureFlag:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        enabled:
          type: boolean
        rollout_percentage:
          type: integer
          minimum: 0
          maximum: 100
        environment:
          type: string
        created_at:
          type: string
          format: date-time

    ChatSession:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        status:
          type: string
          enum: [active, closed]
        initiator_id:
          type: string
        assigned_agent_id:
          type: string
        created_at:
          type: string
          format: date-time
        total_messages:
          type: integer
        unread_count:
          type: integer

    ChatMessage:
      type: object
      properties:
        id:
          type: string
        chat_session_id:
          type: string
        sender_id:
          type: string
        message_type:
          type: string
          enum: [text, image, file, typing, system, notification]
        content:
          type: string
        status:
          type: string
          enum: [sent, delivered, read]
        created_at:
          type: string
          format: date-time

paths:
  # ═══════════════════════════════════════════
  # HEALTH
  # ═══════════════════════════════════════════
  /health:
    get:
      tags: [Health]
      operationId: healthCheck
      summary: Liveness probe
      responses:
        '200':
          description: API is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
                  timestamp:
                    type: string
                    format: date-time

  /ready:
    get:
      tags: [Health]
      operationId: readinessCheck
      summary: Readiness probe (checks DB connectivity)
      responses:
        '200':
          description: Service is ready
        '503':
          description: Service not ready

  # ═══════════════════════════════════════════
  # AUTH (13 endpoints)
  # ═══════════════════════════════════════════
  /api/v1/auth/signup:
    post:
      tags: [Auth]
      operationId: signup
      summary: Register a new user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, first_name, last_name, phone, date_of_birth, street_address, city, state, zip_code, ssn_last4, terms_accepted]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                  maxLength: 128
                  description: "Must contain uppercase, lowercase, digit, and special character"
                first_name:
                  type: string
                last_name:
                  type: string
                phone:
                  type: string
                  description: "10-20 digits"
                date_of_birth:
                  type: string
                  format: date
                  description: "Must be 18+"
                street_address:
                  type: string
                city:
                  type: string
                state:
                  type: string
                zip_code:
                  type: string
                ssn_last4:
                  type: string
                  pattern: '^\d{4}$'
                terms_accepted:
                  type: boolean
      responses:
        '200':
          description: Registration successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: string
                  message:
                    type: string
                  verification_required:
                    type: boolean
        '400':
          description: Validation error
        '409':
          description: Email already registered

  /api/v1/auth/login:
    post:
      tags: [Auth]
      operationId: login
      summary: Login with email and password (triggers OTP)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: OTP sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  otp_required:
                    type: boolean
                  user:
                    $ref: '#/components/schemas/UserProfile'
        '401':
          description: Invalid credentials
        '423':
          description: Account locked

  /api/v1/auth/verify-login-otp:
    post:
      tags: [Auth]
      operationId: verifyLoginOtp
      summary: Verify OTP to complete login and receive tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, code]
              properties:
                user_id:
                  type: string
                code:
                  type: string
                  minLength: 6
                  maxLength: 6
      responses:
        '200':
          description: Tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '400':
          description: Invalid or expired OTP

  /api/v1/auth/verify-email:
    post:
      tags: [Auth]
      operationId: verifyEmail
      summary: Verify email address with token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        '200':
          description: Email verified
        '400':
          description: Invalid or expired token

  /api/v1/auth/verify-phone:
    post:
      tags: [Auth]
      operationId: verifyPhone
      summary: Verify phone number with OTP code
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  minLength: 6
                  maxLength: 6
      responses:
        '200':
          description: Phone verified
        '400':
          description: Invalid code

  /api/v1/auth/resend-login-otp:
    post:
      tags: [Auth]
      operationId: resendLoginOtp
      summary: Resend login OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id]
              properties:
                user_id:
                  type: string
      responses:
        '200':
          description: OTP resent

  /api/v1/auth/resend-verification:
    post:
      tags: [Auth]
      operationId: resendVerification
      summary: Resend email or phone verification
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type]
              properties:
                type:
                  type: string
                  enum: [email, phone]
      responses:
        '200':
          description: Verification resent

  /api/v1/auth/forgot-password:
    post:
      tags: [Auth]
      operationId: forgotPassword
      summary: Request password reset email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Reset email sent (always returns 200)

  /api/v1/auth/reset-password:
    post:
      tags: [Auth]
      operationId: resetPassword
      summary: Reset password with token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, new_password]
              properties:
                token:
                  type: string
                new_password:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Password reset
        '400':
          description: Invalid token

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      operationId: refreshToken
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: New tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '401':
          description: Invalid refresh token

  /api/v1/auth/me:
    get:
      tags: [Auth]
      operationId: getCurrentUser
      summary: Get current user profile
      security:
        - BearerAuth: []
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          description: Not authenticated

  /api/v1/auth/check-email:
    post:
      tags: [Auth]
      operationId: checkEmail
      summary: Check if email is available
      parameters:
        - in: query
          name: email
          required: true
          schema:
            type: string
            format: email
      responses:
        '200':
          description: Availability result
          content:
            application/json:
              schema:
                type: object
                properties:
                  available:
                    type: boolean

  /api/v1/auth/check-phone:
    post:
      tags: [Auth]
      operationId: checkPhone
      summary: Check if phone number is available
      parameters:
        - in: query
          name: phone
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Availability result
          content:
            application/json:
              schema:
                type: object
                properties:
                  available:
                    type: boolean

  # ═══════════════════════════════════════════
  # KYC (11 endpoints)
  # ═══════════════════════════════════════════
  /api/v1/kyc/status:
    get:
      tags: [KYC]
      operationId: getKycStatus
      summary: Get current KYC verification status
      security:
        - BearerAuth: []
      responses:
        '200':
          description: KYC status
          content:
            application/json:
              schema:
                type: object
                properties:
                  kyc_tier:
                    type: string
                  kyc_status:
                    type: string
                  email_verified:
                    type: boolean
                  phone_verified:
                    type: boolean
                  identity_verified:
                    type: boolean
                  documents_submitted:
                    type: integer
                  documents_approved:
                    type: integer

  /api/v1/kyc/limits:
    get:
      tags: [KYC]
      operationId: getKycLimits
      summary: Get transaction limits for current KYC tier
      security:
        - BearerAuth: []
      responses:
        '200':
          description: KYC limits

  /api/v1/kyc/check-limit:
    post:
      tags: [KYC]
      operationId: checkKycLimit
      summary: Check if a transaction amount is within KYC limits
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount]
              properties:
                amount:
                  type: number
                  format: float
      responses:
        '200':
          description: Limit check result
          content:
            application/json:
              schema:
                type: object
                properties:
                  allowed:
                    type: boolean
                  remaining_daily:
                    type: number
                  remaining_monthly:
                    type: number

  /api/v1/kyc/documents/upload:
    post:
      tags: [KYC]
      operationId: uploadKycDocument
      summary: Upload a KYC document
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [document_type, file]
              properties:
                document_type:
                  type: string
                  enum: [drivers_license, passport, state_id, ssn_card, utility_bill, bank_statement, selfie]
                document_subtype:
                  type: string
                file:
                  type: string
                  format: binary
                  description: "JPEG, PNG, HEIC, or PDF. 10KB-10MB."
      responses:
        '200':
          description: Document uploaded
        '400':
          description: Invalid file

  /api/v1/kyc/documents:
    get:
      tags: [KYC]
      operationId: listKycDocuments
      summary: List uploaded KYC documents
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Document list

  /api/v1/kyc/documents/{document_id}:
    delete:
      tags: [KYC]
      operationId: deleteKycDocument
      summary: Delete a pending KYC document
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: document_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Document deleted
        '404':
          description: Document not found

  /api/v1/kyc/upgrade:
    post:
      tags: [KYC]
      operationId: requestKycUpgrade
      summary: Request KYC tier upgrade
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [target_tier]
              properties:
                target_tier:
                  type: string
                  enum: [tier1, tier2, tier3]
      responses:
        '200':
          description: Upgrade requirements

  /api/v1/kyc/identity/start:
    post:
      tags: [KYC]
      operationId: startIdentityVerification
      summary: Start Plaid IDV identity verification
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Plaid link token
          content:
            application/json:
              schema:
                type: object
                properties:
                  link_token:
                    type: string
                  session_id:
                    type: string
                  expires_at:
                    type: string
                    format: date-time

  /api/v1/kyc/identity/complete:
    post:
      tags: [KYC]
      operationId: completeIdentityVerification
      summary: Complete identity verification
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [session_id]
              properties:
                session_id:
                  type: string
      responses:
        '200':
          description: Verification result

  /api/v1/kyc/screening/ofac:
    post:
      tags: [KYC]
      operationId: runOfacScreening
      summary: Run OFAC sanctions screening
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Screening result

  /api/v1/kyc/requirements/{tier}:
    get:
      tags: [KYC]
      operationId: getKycTierRequirements
      summary: Get requirements for a specific KYC tier
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: tier
          required: true
          schema:
            type: string
            enum: [tier1, tier2, tier3]
      responses:
        '200':
          description: Tier requirements

  # ═══════════════════════════════════════════
  # ACCOUNTS & TRANSACTIONS (9 endpoints)
  # ═══════════════════════════════════════════
  /api/v1/accounts:
    get:
      tags: [Accounts]
      operationId: listAccounts
      summary: Get all user accounts
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Account list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    name:
                      type: string
                    type:
                      type: string
                    balance:
                      type: number
                    currency:
                      type: string

  /api/v1/accounts/{account_id}/balance:
    get:
      tags: [Accounts]
      operationId: getAccountBalance
      summary: Get account balance
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: account_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Account balance

  /api/v1/transactions:
    get:
      tags: [Accounts]
      operationId: listTransactions
      summary: Get transaction history
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Transaction list

  /api/v1/banks/linked:
    get:
      tags: [Accounts]
      operationId: listLinkedBanks
      summary: Get linked bank accounts
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Linked banks

  /api/v1/banks/plaid-link:
    post:
      tags: [Accounts]
      operationId: createPlaidLink
      summary: Create a Plaid Link token for bank linking
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Plaid link token

  /api/v1/analytics:
    get:
      tags: [Accounts]
      operationId: getAnalytics
      summary: Get spending analytics and insights
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Analytics data

  /api/v1/cards:
    get:
      tags: [Accounts]
      operationId: listSimpleCards
      summary: Get linked payment cards
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Card list
    post:
      tags: [Accounts]
      operationId: addSimpleCard
      summary: Add a payment card
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cardNumber, expiryDate, holderName]
              properties:
                cardNumber:
                  type: string
                expiryDate:
                  type: string
                holderName:
                  type: string
      responses:
        '200':
          description: Card added

  # ═══════════════════════════════════════════
  # FIS CARD ISSUANCE (9 endpoints)
  # ═══════════════════════════════════════════
  /api/v1/fis/cards/issue/virtual:
    post:
      tags: [FIS Cards]
      operationId: issueVirtualCard
      summary: Issue a new virtual card
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cardholder_name]
              properties:
