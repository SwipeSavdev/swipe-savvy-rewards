name: E2E & Load Testing

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'swipesavvy-admin-portal/tests/**'
      - 'swipesavvy-wallet-web/tests/**'
      - 'swipesavvy-ai-agents/load-test-*.js'
      - '.github/workflows/test-e2e.yml'
  pull_request:
    branches:
      - main
      - develop

jobs:
  e2e-admin-portal:
    runs-on: ubuntu-latest
    name: E2E Tests - Admin Portal
    # Disabled: playwright config points at baseURL http://localhost:5173 (Vite dev server),
    # but the workflow doesn't start the dev server before running tests, so every run
    # fails on connection refused. Re-enable after adding a `webServer` block to
    # playwright.config.ts (or starting `npm run dev` in the background here first).
    if: false
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: '20.19.5'
          cache: 'npm'
          cache-dependency-path: 'swipesavvy-admin-portal/package-lock.json'

      - name: Install dependencies
        working-directory: swipesavvy-admin-portal
        run: npm ci

      - name: Install Playwright browsers
        working-directory: swipesavvy-admin-portal
        run: npx playwright install

      - name: Run E2E tests
        working-directory: swipesavvy-admin-portal
        run: npm run test:e2e 2>&1 | tee test-results.txt || true
      
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: admin-portal-playwright-report
          path: swipesavvy-admin-portal/playwright-report/
          retention-days: 14
      
      - name: Check test results
        working-directory: swipesavvy-admin-portal
        run: |
          if grep -q "PASSED\|passed" test-results.txt; then
            echo "✅ E2E tests executed"
          else
            echo "⚠️ E2E tests completed with warnings"
          fi

  e2e-wallet-web:
    runs-on: ubuntu-latest
    name: E2E Tests - Wallet Web
    # Disabled: wallet-web has neither a tests/e2e/ directory, a playwright config, nor
    # a `test:e2e` npm script. Re-enable once Playwright is wired up there.
    if: false
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      
      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: '20.19.5'
          cache: 'npm'
          cache-dependency-path: 'swipesavvy-wallet-web/package-lock.json'
      
      - name: Install dependencies
        working-directory: swipesavvy-wallet-web
        run: npm ci
      
      - name: Install Playwright browsers
        working-directory: swipesavvy-wallet-web
        run: npx playwright install
      
      - name: Run E2E tests
        working-directory: swipesavvy-wallet-web
        run: npm run test:e2e 2>&1 | tee test-results.txt || true
      
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wallet-web-playwright-report
          path: swipesavvy-wallet-web/playwright-report/
          retention-days: 14

  load-testing:
    runs-on: ubuntu-latest
    name: Load Testing with k6
    # Disabled: requires a running API at localhost:8000 with seeded test data, plus
    # Postgres/Redis service containers preloaded with state. The 'node:20.19.5'
    # service container has no actual API startup wired in, so health-check fails
    # immediately. Re-enable once a proper test-environment bootstrap is added
    # (e.g. docker-compose-test.yml that builds + starts the ai-agents API).
    if: false
    timeout-minutes: 60
    services:
      api:
        image: node:20.19.5
        options: >-
          --health-cmd "curl -f http://localhost:8000/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 8000:8000
      
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: swipesavvy_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      
      - name: Install k6
        run: |
          sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3232A || true
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6-stable.list
          sudo apt-get update
          sudo apt-get install -y k6
      
      - name: Run sustained load test
        working-directory: swipesavvy-ai-agents
        run: |
          k6 run load-test-sustained.js --out json=results-sustained.json 2>&1 | tee sustained-test.log || true
      
      - name: Run spike load test
        working-directory: swipesavvy-ai-agents
        run: |
          k6 run load-test-spike.js --out json=results-spike.json 2>&1 | tee spike-test.log || true
      
      - name: Run soak load test
        working-directory: swipesavvy-ai-agents
        if: github.ref == 'refs/heads/main'
        run: |
          k6 run load-test-soak.js --out json=results-soak.json 2>&1 | tee soak-test.log || true
      
      - name: Upload load test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: k6-load-test-results
          path: swipesavvy-ai-agents/results-*.json
          retention-days: 30
      
      - name: Analyze load test results
        working-directory: swipesavvy-ai-agents
        if: always()
        run: |
          echo "📊 Load Test Summary"
          for file in sustained-test.log spike-test.log soak-test.log; do
            if [ -f "$file" ]; then
              echo "--- $file ---"
              grep -E "http_req_duration|http_req_failed|vus_max" "$file" | head -5 || true
            fi
          done

  test-summary:
    runs-on: ubuntu-latest
    name: Test Summary
    needs: [e2e-admin-portal, e2e-wallet-web, load-testing]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "✅ E2E and Load Testing completed"
          echo ""
          echo "Artifacts available:"
          echo "- Admin Portal Playwright report"
          echo "- Wallet Web Playwright report"
          echo "- k6 Load test results"
