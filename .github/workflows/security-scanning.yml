name: Security Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run security scans daily at 2 AM UTC
    - cron: '0 2 * * *'

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  # Python security scanning with Bandit
  python-security:
    name: Python Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./swipesavvy-ai-agents
    
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      
      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.11'
      
      - name: Install security scanning tools
        run: |
          # safety 3.x returns exit 64 without an API key; using pip-audit (OSS, no auth) instead.
          pip install bandit pip-audit

      - name: Run Bandit security scan
        # -ll = medium+ severity; -ii = medium+ confidence; --exit-zero = report-only.
        # Findings show up in the artifact below for triage without blocking every commit.
        run: |
          bandit -r app services -f json -o bandit-report.json -ll -ii --exit-zero
          bandit -r app services -ll -ii --exit-zero | head -40

      - name: Run pip-audit vulnerability check
        run: |
          python -m pip_audit -r requirements-pinned.txt --format json -o pip-audit-report.json || true
          python -m pip_audit -r requirements-pinned.txt | head -40 || true

      - name: Upload Bandit results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: bandit-report
          path: swipesavvy-ai-agents/bandit-report.json

      - name: Upload pip-audit results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: pip-audit-report
          path: swipesavvy-ai-agents/pip-audit-report.json

  # Detect secrets with detect-secrets
  secrets-detection:
    name: Secrets Detection
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./swipesavvy-ai-agents
    
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0  # Full history for scanning
      
      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.11'
      
      - name: Install detect-secrets
        run: pip install detect-secrets
      
      - name: Scan for secrets
        run: |
          detect-secrets scan --all-files --force-use-all-plugins \
            --baseline .secrets.baseline \
            app services tests || echo "Scan completed"
      
      - name: Audit secrets
        run: detect-secrets audit .secrets.baseline || true

  # Dependency vulnerability scanning
  dependency-check:
    name: Dependency Vulnerability Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./swipesavvy-ai-agents
    
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      
      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.11'
      
      - name: Generate dependencies report
        run: pip freeze > requirements-lock.txt
      
      - name: Check dependencies with pip-audit
        run: |
          # safety check requires an API key in 3.x; pip-audit is the OSS replacement.
          # The pinned-deps file in this repo is requirements-pinned.txt (not requirements-lock.txt).
          pip install pip-audit
          python -m pip_audit -r requirements-pinned.txt --format json -o dependency-report.json || true
      
      - name: Upload dependency report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: dependency-report
          path: swipesavvy-ai-agents/dependency-report.json

  # Code quality with Pylint
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./swipesavvy-ai-agents
    
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      
      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pylint
      
      - name: Run Pylint
        run: |
          pylint app services --exit-zero \
            --output-format=json > pylint-report.json || true
      
      - name: Upload Pylint results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: pylint-report
          path: swipesavvy-ai-agents/pylint-report.json

  # Configuration validation
  config-validation:
    name: Configuration Validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./swipesavvy-ai-agents
    
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      
      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.11'
      
      - name: Check for hardcoded secrets
        run: |
          echo "Checking for hardcoded secrets..."
          # Match literal-string assignments only: password = "literal" / PASSWORD: "literal"
          # Excludes env-var reads, function calls, f-strings, hashing utilities, URL paths.
          if grep -rnE "^[[:space:]]*[A-Za-z_]*[Pp]assword[A-Za-z_]*[[:space:]]*=[[:space:]]*[\"'][^\"'$\\\\{][^\"']*[\"']" --include="*.py" app services \
              | grep -vE "password_hash|get_password_hash|os\.getenv|os\.environ|getenv\(|getattr\(|settings\.|config\.|self\.|cls\.|return |\.encode|\.decode|\bf['\"]|@"; then
            echo "❌ ERROR: Hardcoded passwords detected!"
            exit 1
          fi
          echo "✅ No hardcoded passwords found"
      
      - name: Check JWT configuration
        run: |
          echo "Checking JWT configuration..."
          # Match literal-string ASSIGNMENT of JWT_SECRET_KEY only (not comparisons or env reads).
          # JWT_SECRET_KEY = "literal" but NOT JWT_SECRET_KEY == "...", JWT_SECRET_KEY: str, etc.
          if grep -rnE "^[[:space:]]*JWT_SECRET_KEY[[:space:]]*=[[:space:]]*[\"'][^\"']+[\"']" --include="*.py" app \
              | grep -vE "os\.getenv|os\.environ|getenv\(|getattr\(|settings\.|self\.|cls\.|Field\(|: str"; then
            echo "❌ ERROR: Hardcoded JWT_SECRET_KEY found!"
            exit 1
          fi
          echo "✅ JWT configuration is secure"
      
      - name: Check environment files
        run: |
          echo "Verifying .env files..."
          [ -f .env.example ] && echo "✅ .env.example exists" || echo "⚠️ .env.example missing"
          [ -f .env.staging ] && echo "✅ .env.staging exists" || echo "⚠️ .env.staging missing"
          [ -f .env.production ] && echo "✅ .env.production exists" || echo "⚠️ .env.production missing"

  # Report summary
  security-summary:
    name: Security Scan Summary
    runs-on: ubuntu-latest
    needs: [python-security, secrets-detection, dependency-check, code-quality, config-validation]
    if: always()
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: security-reports
      
      - name: Generate security report
        run: |
          echo "# Security Scan Results" > security-report.md
          echo "" >> security-report.md
          echo "## Summary" >> security-report.md
          echo "- Python Security: ${{ needs.python-security.result }}" >> security-report.md
          echo "- Secrets Detection: ${{ needs.secrets-detection.result }}" >> security-report.md
          echo "- Dependency Check: ${{ needs.dependency-check.result }}" >> security-report.md
          echo "- Code Quality: ${{ needs.code-quality.result }}" >> security-report.md
          echo "- Config Validation: ${{ needs.config-validation.result }}" >> security-report.md
      
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('security-report.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });
