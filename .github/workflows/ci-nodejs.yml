name: CI - Node.js Projects

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
    paths:
      - 'swipesavvy-admin-portal/**'
      - 'swipesavvy-wallet-web/**'
      - '.github/workflows/ci-nodejs.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'swipesavvy-admin-portal/**'
      - 'swipesavvy-wallet-web/**'

jobs:
  version-check:
    runs-on: ubuntu-latest
    name: Version Checks
    strategy:
      matrix:
        node-version: ['20.19.5']
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Verify Node.js version
        run: |
          EXPECTED_NODE="20.19.5"
          ACTUAL_NODE=$(node --version | sed 's/v//')
          if [[ "$ACTUAL_NODE" != "$EXPECTED_NODE" ]]; then
            echo "❌ Node version mismatch. Expected $EXPECTED_NODE, got $ACTUAL_NODE"
            exit 1
          fi
          echo "✅ Node.js version verified: $ACTUAL_NODE"

      - name: Verify npm version
        run: |
          EXPECTED_NPM="10.8.2"
          ACTUAL_NPM=$(npm --version)
          echo "npm version: $ACTUAL_NPM (expected: $EXPECTED_NPM or higher)"

      - name: Check .nvmrc files
        run: |
          for repo in swipesavvy-admin-portal swipesavvy-wallet-web; do
            if [ -f "$repo/.nvmrc" ]; then
              echo "✅ Found .nvmrc in $repo: $(cat $repo/.nvmrc)"
            else
              echo "⚠️  Missing .nvmrc in $repo (non-blocking)"
            fi
          done

  lock-file-validation:
    runs-on: ubuntu-latest
    name: Lock File Validation
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Verify package-lock.json files
        run: |
          for repo in swipesavvy-admin-portal swipesavvy-wallet-web; do
            if [ -f "$repo/package-lock.json" ]; then
              echo "✅ Found package-lock.json in $repo"
            else
              echo "❌ Missing package-lock.json in $repo"
              exit 1
            fi
          done
          echo "✅ All lock files validated"

  lint-admin-portal:
    runs-on: ubuntu-latest
    name: Lint & Test - Admin Portal
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: '20.19.5'
          cache: 'npm'
          cache-dependency-path: 'swipesavvy-admin-portal/package-lock.json'

      - name: Install dependencies
        working-directory: swipesavvy-admin-portal
        run: npm ci

      - name: Run ESLint
        working-directory: swipesavvy-admin-portal
        run: npx eslint src/ --ext .ts,.tsx --format json > eslint-report.json || true
        continue-on-error: true

      - name: Check ESLint for critical errors
        working-directory: swipesavvy-admin-portal
        run: |
          if grep -q '"severity":"error"' eslint-report.json; then
            echo "⚠️  ESLint errors found (non-blocking for now)"
          fi

      - name: Run type check
        working-directory: swipesavvy-admin-portal
        run: npx tsc --noEmit --pretty

      - name: Build project
        working-directory: swipesavvy-admin-portal
        run: npm run build

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: admin-portal-build
          path: swipesavvy-admin-portal/dist/
          retention-days: 5

  lint-wallet-web:
    runs-on: ubuntu-latest
    name: Lint & Test - Wallet Web
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: '20.19.5'
          cache: 'npm'
          cache-dependency-path: 'swipesavvy-wallet-web/package-lock.json'

      - name: Install dependencies
        working-directory: swipesavvy-wallet-web
        run: npm ci

      - name: Run ESLint
        working-directory: swipesavvy-wallet-web
        run: npx eslint src/ --ext .ts,.tsx --format json > eslint-report.json || true
        continue-on-error: true

      - name: Run type check
        working-directory: swipesavvy-wallet-web
        run: npx tsc --noEmit --pretty

      - name: Build project
        working-directory: swipesavvy-wallet-web
        run: npm run build

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wallet-web-build
          path: swipesavvy-wallet-web/dist/
          retention-days: 5

  security-audit:
    runs-on: ubuntu-latest
    name: Security Audit
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: '20.19.5'

      - name: Run npm audit on all repos
        run: |
          echo "🔍 Running npm audit on all Node.js projects..."
          for repo in swipesavvy-admin-portal swipesavvy-wallet-web; do
            echo ""
            echo "Auditing $repo..."
            cd "$repo"
            npm audit --json > audit-report.json 2>&1 || true
            CRITICAL=$(jq '.metadata.vulnerabilities.critical // 0' audit-report.json)
            if [ "$CRITICAL" -gt 0 ]; then
              echo "❌ CRITICAL vulnerabilities found in $repo: $CRITICAL"
              exit 1
            else
              echo "✅ No critical vulnerabilities in $repo"
            fi
            cd ..
          done

  summary:
    runs-on: ubuntu-latest
    name: CI Summary
    needs: [version-check, lock-file-validation, lint-admin-portal, lint-wallet-web, security-audit]
    if: always()
    steps:
      - name: Check workflow status
        run: |
          if [[ "${{ needs.version-check.result }}" == "failure" ]] || \
             [[ "${{ needs.lock-file-validation.result }}" == "failure" ]] || \
             [[ "${{ needs.lint-admin-portal.result }}" == "failure" ]] || \
             [[ "${{ needs.lint-wallet-web.result }}" == "failure" ]] || \
             [[ "${{ needs.security-audit.result }}" == "failure" ]]; then
            echo "❌ CI pipeline failed"
            exit 1
          else
            echo "✅ All CI checks passed"
          fi
